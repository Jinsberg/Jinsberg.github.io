<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./css/style.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <title>Cartão Pessoal</title>
</head>

<body>
  <main class="container-bg">
    <div class="container">
      <div class="images-person">
        <div class="image-people-details">
          <img src="./img/icons/build.svg" alt="" width="80" height="80">
        </div>
        <div class="images-people-me">
          <img src="./img/roger.jpg" alt="Imagem Pessoal Roger" width="180" height="180">
        </div>
      </div>
      <div class="card-content">
        <h1>Roger Viviani</h1>
        <a href="/">@rogerviviani</a>
        <p>Programador em treinamento, futuro dono do youtube</p>
      </div>
      <ul class="card-socials-itens">
        <li>
          <a href="https://www.youtube.com/channel/UCvkiJgK3fVRx343uDIsjkgQ" target="_blank"><img src="./img/icons/youtube.svg" alt="youtube" width="48" height="48">
        </li>
        <li>
          <a href="https://twitter.com/RogerJinsberg" target="_blank"><img src="/img/icons/twitter.svg" alt="twitter" width="48" height="48">
        </li>
        <li>
          <a href="https://www.instagram.com/rogerviviani/" target="_blank"><img src="/img/icons/insta.svg" alt="instagram" width="48" height="48">
        </li>
        <li>
          <a href="https://www.facebook.com/roger.viviani" target="_blank"><img src="/img/icons/fac.svg" alt="facebook" width="48" height="48">
        </li>
      </ul>
    </div>
    </div>
  </main>
</body>

</html>
